name: Build and Deploy Worldnews to Cloud Run

on:
  push:
    branches:
      - 'gcp-branch'

env:
  PROJECT_ID: 'project-74768f44-6cbb-4164-a77'
  REGION: 'us-central1'
  SERVICE_NAME: 'worldnews-app'
  GAR_LOCATION: 'us-central1'
  REPOSITORY: 'world-news-repo' # The one you already created
  # Update YOUR_PROVIDER_ID with the actual ID from your console
  WIF_PROVIDER: 'projects/58328493344/locations/global/workloadIdentityPools/github-pool/providers/github-actions'
  WIF_SERVICE_ACCOUNT: 'worldnews-github-deployer@project-74768f44-6cbb-4164-a77.iam.gserviceaccount.com'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Docker Auth
        uses: 'docker/login-action@v3'
        with:
          username: 'oauth2access'
          password: '${{ steps.auth.outputs.access_token }}'
          registry: '${{ env.GAR_LOCATION }}-docker.pkg.dev'

      - name: Build and Push Container
        run: |-
          DOCKER_TAG="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t $DOCKER_TAG .
          docker push $DOCKER_TAG

      - name: Deploy to Cloud Run
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          # Environment variables for your app
          env_vars: |
            NODE_ENV=production
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            WORLD_NEWS_API_KEY=${{ secrets.WORLD_NEWS_API_KEY }}
            INTERNAL_SCHEDULER_ENABLED=false
          flags: '--allow-unauthenticated'
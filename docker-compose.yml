services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: worldnews_client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - WORLD_NEWS_API_KEY=${WORLD_NEWS_API_KEY:?WORLD_NEWS_API_KEY is required}
      - INTERNAL_SCHEDULER_ENABLED=true
    command: ["node", "server.js"]
